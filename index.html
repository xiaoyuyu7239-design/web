<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>水千丞 188 男团人物关系星图</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #020713;
      --bg-2: #071323;
      --panel: rgba(5, 15, 31, 0.78);
      --panel-strong: rgba(7, 18, 35, 0.9);
      --line: rgba(186, 219, 255, 0.18);
      --text: #ecf6ff;
      --muted: #98aac0;
      --gold: #ffd78a;
      --cyan: #93e3ff;
      --blue: #8fb9ff;
      --rose: #ffc3d5;
      --green: #aef0be;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 18%, rgba(57, 111, 155, 0.22), transparent 31%),
        radial-gradient(circle at 78% 30%, rgba(177, 151, 93, 0.13), transparent 25%),
        radial-gradient(circle at 48% 78%, rgba(103, 153, 186, 0.19), transparent 35%),
        linear-gradient(145deg, #02050d 0%, #071524 48%, #020713 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
      letter-spacing: 0;
    }

    button {
      border: 0;
      color: var(--text);
      cursor: pointer;
    }

    #starMap {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      cursor: grab;
      touch-action: none;
    }

    #starMap.dragging {
      cursor: grabbing;
    }

    .app-shell {
      position: relative;
      min-height: 100dvh;
      pointer-events: none;
    }

    .topbar {
      position: fixed;
      top: 16px;
      left: 16px;
      right: 388px;
      display: grid;
      gap: 10px;
      pointer-events: auto;
      z-index: 4;
    }

    .brand-row,
    .control-row,
    .filter-row,
    .bottom-panel,
    .detail-panel {
      border: 1px solid rgba(184, 219, 255, 0.18);
      background: linear-gradient(145deg, rgba(4, 13, 28, 0.84), rgba(5, 19, 37, 0.68));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .brand-row {
      position: relative;
      z-index: 6;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 58px;
      padding: 10px 12px 10px 14px;
      border-radius: 8px;
    }

    .brand-mark {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .mark-star {
      width: 30px;
      height: 30px;
      flex: 0 0 auto;
      filter: drop-shadow(0 0 12px rgba(255, 213, 138, 0.88));
    }

    .brand-title {
      min-width: 0;
    }

    .brand-title h1 {
      margin: 0;
      overflow: hidden;
      color: #f6fbff;
      font-size: clamp(18px, 2.4vw, 28px);
      font-weight: 750;
      line-height: 1.12;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand-title span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.2;
    }

    .search-wrap {
      position: relative;
      width: min(360px, 42vw);
      flex: 0 1 auto;
    }

    .search-input {
      width: 100%;
      height: 38px;
      border: 1px solid rgba(184, 219, 255, 0.22);
      border-radius: 8px;
      outline: 0;
      background: rgba(2, 8, 18, 0.72);
      color: var(--text);
      padding: 0 40px 0 12px;
    }

    .search-input:focus {
      border-color: rgba(147, 227, 255, 0.72);
      box-shadow: 0 0 0 3px rgba(147, 227, 255, 0.12);
    }

    .search-icon {
      position: absolute;
      top: 50%;
      right: 12px;
      width: 18px;
      height: 18px;
      transform: translateY(-50%);
      color: var(--cyan);
      opacity: 0.86;
      pointer-events: none;
    }

    .search-results {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      width: min(420px, 82vw);
      max-height: 310px;
      overflow: auto;
      border: 1px solid rgba(184, 219, 255, 0.2);
      border-radius: 8px;
      background: rgba(3, 11, 24, 0.96);
      box-shadow: var(--shadow);
      padding: 6px;
      display: none;
      z-index: 40;
    }

    .search-results.is-open {
      display: grid;
      gap: 4px;
    }

    .result-button,
    .relation-button,
    .important-button {
      width: 100%;
      display: grid;
      border-radius: 6px;
      background: transparent;
      text-align: left;
    }

    .result-button {
      grid-template-columns: 10px 1fr auto;
      align-items: center;
      gap: 9px;
      padding: 8px;
    }

    .result-button:hover,
    .relation-button:hover,
    .important-button:hover,
    .chip:hover,
    .tool-button:hover {
      background: rgba(151, 199, 255, 0.12);
    }

    .result-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      box-shadow: 0 0 12px currentColor;
    }

    .result-name {
      min-width: 0;
      overflow: hidden;
      color: #f7fbff;
      font-size: 14px;
      font-weight: 700;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .result-meta {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .control-row {
      position: relative;
      z-index: 3;
      display: flex;
      gap: 8px;
      align-items: center;
      overflow-x: auto;
      padding: 8px;
      border-radius: 8px;
      scrollbar-width: thin;
    }

    .tool-button,
    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 34px;
      border: 1px solid rgba(184, 219, 255, 0.18);
      border-radius: 8px;
      background: rgba(7, 21, 42, 0.7);
      color: #ddecff;
      padding: 0 11px;
      white-space: nowrap;
    }

    .tool-button svg {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
    }

    .tool-button.is-active,
    .chip.is-active {
      border-color: rgba(255, 215, 138, 0.7);
      background: rgba(255, 215, 138, 0.13);
      color: #fff7df;
      box-shadow: inset 0 0 18px rgba(255, 215, 138, 0.1), 0 0 20px rgba(255, 215, 138, 0.08);
    }

    .filter-row {
      position: relative;
      z-index: 2;
      display: grid;
      gap: 8px;
      padding: 9px;
      border-radius: 8px;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .filter-label {
      width: 42px;
      flex: 0 0 auto;
      color: #bed2e8;
      font-size: 12px;
      font-weight: 700;
    }

    .chip-list {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: thin;
    }

    .chip {
      min-height: 28px;
      padding: 0 9px;
      color: #cfe0f2;
      font-size: 12px;
    }

    .chip i {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      box-shadow: 0 0 10px currentColor;
    }

    .detail-panel {
      position: fixed;
      top: 16px;
      right: 16px;
      bottom: 112px;
      width: 352px;
      overflow: auto;
      border-radius: 8px;
      padding: 16px;
      pointer-events: auto;
      z-index: 5;
    }

    .detail-top {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
    }

    .detail-name {
      margin: 0;
      color: #fffaf0;
      font-size: 26px;
      line-height: 1.12;
      text-shadow: 0 0 18px rgba(255, 215, 138, 0.32);
      word-break: break-word;
    }

    .close-panel {
      display: none;
      width: 32px;
      height: 32px;
      flex: 0 0 auto;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #dbeaff;
    }

    .alias-line {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 14px 0;
    }

    .tag {
      border: 1px solid rgba(184, 219, 255, 0.17);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: #d9eaff;
      padding: 5px 8px;
      font-size: 12px;
      line-height: 1;
    }

    .bio {
      margin: 0 0 16px;
      color: #d7e5f4;
      font-size: 14px;
      line-height: 1.7;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 16px 0 8px;
      color: #fff6dd;
      font-size: 13px;
      font-weight: 800;
    }

    .section-title::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 12px var(--gold);
    }

    .relation-list {
      display: grid;
      gap: 6px;
    }

    .relation-button {
      grid-template-columns: 1fr;
      gap: 3px;
      border: 1px solid rgba(184, 219, 255, 0.12);
      padding: 9px;
      color: #dceaff;
    }

    .relation-button strong {
      color: #fbfdff;
      font-size: 13px;
    }

    .relation-button span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .empty-state {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .bottom-panel {
      position: fixed;
      left: 16px;
      right: 388px;
      bottom: 16px;
      display: grid;
      gap: 8px;
      border-radius: 8px;
      padding: 10px;
      pointer-events: auto;
      z-index: 4;
    }

    .bottom-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: #d9e8f7;
      font-size: 12px;
      font-weight: 800;
    }

    .bottom-count {
      color: var(--muted);
      font-weight: 600;
    }

    .important-list {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(150px, 1fr);
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 1px;
      scrollbar-width: thin;
    }

    .important-button {
      min-height: 58px;
      border: 1px solid rgba(184, 219, 255, 0.14);
      grid-template-columns: auto 1fr;
      align-items: center;
      column-gap: 9px;
      padding: 9px;
      color: #eaf3ff;
    }

    .important-orb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      box-shadow: 0 0 18px currentColor;
    }

    .important-text {
      min-width: 0;
    }

    .important-name {
      overflow: hidden;
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .important-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 98px;
      transform: translateX(-50%) translateY(12px);
      border: 1px solid rgba(255, 215, 138, 0.24);
      border-radius: 8px;
      background: rgba(5, 14, 28, 0.88);
      color: #fff6de;
      box-shadow: var(--shadow);
      opacity: 0;
      padding: 10px 12px;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      z-index: 12;
    }

    .toast.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    ::selection {
      background: rgba(255, 215, 138, 0.28);
    }

    @media (max-width: 980px) {
      .topbar {
        right: 16px;
      }

      .brand-row {
        align-items: stretch;
        flex-direction: column;
      }

      .search-wrap {
        width: 100%;
      }

      .detail-panel {
        top: auto;
        left: 12px;
        right: 12px;
        bottom: 136px;
        width: auto;
        max-height: 34dvh;
        transform: translateY(calc(100% + 110px));
        transition: transform 220ms ease;
      }

      body.panel-open .detail-panel {
        transform: translateY(0);
      }

      .close-panel {
        display: inline-grid;
        place-items: center;
      }

      .bottom-panel {
        left: 12px;
        right: 12px;
        bottom: 12px;
      }

      .important-list {
        grid-auto-columns: minmax(136px, 44vw);
      }
    }

    @media (max-width: 640px) {
      .topbar {
        top: 10px;
        left: 10px;
        right: 10px;
        gap: 8px;
      }

      .brand-row {
        min-height: auto;
        padding: 10px;
      }

      .brand-title h1 {
        font-size: 18px;
      }

      .brand-title span {
        display: none;
      }

      .control-row {
        padding: 7px;
      }

      .tool-button {
        min-height: 32px;
        padding: 0 9px;
        font-size: 12px;
      }

      .filter-row {
        gap: 7px;
        padding: 8px;
      }

      .filter-group {
        align-items: center;
        flex-direction: row;
        gap: 8px;
      }

      .filter-label {
        width: 42px;
      }

      .detail-name {
        font-size: 22px;
      }

      .bottom-panel {
        padding: 8px;
      }

      .toast {
        width: calc(100vw - 24px);
        bottom: 78px;
        text-align: center;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <canvas id="starMap" aria-label="188男团人物关系星图"></canvas>

  <main class="app-shell">

          重置视图

      </div>

      <div class="filter-row" aria-label="分类筛选">
        <div class="filter-group">
          <span class="filter-label">星域</span>
          <div id="categoryFilters" class="chip-list"></div>
        </div>
        <div class="filter-group">
          <span class="filter-label">身份</span>
          <div id="roleFilters" class="chip-list"></div>
        </div>
        <div class="filter-group">
          <span class="filter-label">等级</span>
          <div id="levelFilters" class="chip-list"></div>
        </div>
      </div>
    </section>

    <aside class="detail-panel" aria-live="polite">
      <div class="detail-top">
        <div>
          <h2 id="detailName" class="detail-name">188男团</h2>
          <p id="detailAlias" class="alias-line"></p>
        </div>
        <button id="closePanelBtn" class="close-panel" type="button" aria-label="关闭详情">×</button>
      </div>
      <div id="detailTags" class="tag-row"></div>
      <p id="detailBio" class="bio"></p>
      <div class="section-title">主要关系</div>
      <div id="detailRelations" class="relation-list"></div>
    </aside>

    <section class="bottom-panel" aria-label="重要节点">
      <div class="bottom-head">
        <span>关系最多 / 最重要节点</span>
        <span id="visibleCount" class="bottom-count"></span>
      </div>
      <div id="importantList" class="important-list"></div>
    </section>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </main>

    function hashNumber(value) {
      let hash = 2166136261;
      for (let i = 0; i < value.length; i += 1) {
        hash ^= value.charCodeAt(i);
        hash += (hash << 1) + (hash << 4) + (hash << 7) + (hash << 8) + (hash << 24);
      }
      return Math.abs(hash >>> 0);
    }

    function seededRandom(seed) {

        return (value - 1) / 2147483646;
      };
    }

      return {
        r: (value >> 16) & 255,

        b: value & 255
      };
    }

          node.x = anchor.x + Math.cos(angle) * radius;
          node.y = anchor.y + Math.sin(angle) * radius;
          node.nebula = { x: node.x, y: node.y };
        });
      });

      const ringByLevel = { "S+": 0, S: 205, "A+": 370, A: 520, B: 670 };

        const categoryIndex = Math.max(0, categories.indexOf(node.category));
        const baseAngle = categoryIndex / categories.length * Math.PI * 2 - Math.PI / 2;
        const localOffset = ((index % 4) - 1.5) * 0.16;
        node.layered = {

          y: Math.sin(baseAngle + localOffset) * ring

        if (node.id === "group188") {
          node.layered = { x: 0, y: 0 };
        }
      });

    function updateLayoutPositions() {
      graphData.nodes.forEach((node) => {
        const target = currentTarget(node);
        node.x += (target.x - node.x) * 0.08;
        node.y += (target.y - node.y) * 0.08;
      });
    }

    function worldToScreen(x, y) {
      const cos = Math.cos(state.view.rotation);
      const sin = Math.sin(state.view.rotation);
      const rx = x * cos - y * sin;
      const ry = x * sin + y * cos;
      return {
        x: state.width / 2 + (rx + state.view.x) * state.view.scale,
        y: state.height / 2 + (ry + state.view.y) * state.view.scale
      };
    }

    function screenToWorld(x, y) {
      const rx = (x - state.width / 2) / state.view.scale - state.view.x;
      const ry = (y - state.height / 2) / state.view.scale - state.view.y;
      const cos = Math.cos(state.view.rotation);
      const sin = Math.sin(state.view.rotation);
      return {
        x: rx * cos + ry * sin,
        y: -rx * sin + ry * cos
      };
    }

    function isNodeVisible(node) {
      const { category, role, level } = state.filters;
      return (category === "all" || node.category === category)
        && (role === "all" || node.role === role)
        && (level === "all" || node.level === level);
    }

    function isEdgeVisible(edge) {
      return isNodeVisible(nodeMap.get(edge.source)) && isNodeVisible(nodeMap.get(edge.target));
    }

    function nodeRadius(node) {
      const d = degree.get(node.id) || 0;
      return Math.min(28, 7 + d * 1.7 + node.importance * 0.65);
    }

    function drawBackground(now) {
      ctx.clearRect(0, 0, state.width, state.height);
      const base = ctx.createLinearGradient(0, 0, state.width, state.height);
      base.addColorStop(0, "#01040c");
      base.addColorStop(0.42, "#061326");
      base.addColorStop(1, "#020610");
      ctx.fillStyle = base;
      ctx.fillRect(0, 0, state.width, state.height);

      ctx.save();
      ctx.globalCompositeOperation = "screen";
      state.dust.forEach((cloud) => {
        const drift = Math.sin(now * 0.00005 + cloud.x) * 14;
        const gradient = ctx.createRadialGradient(cloud.x + drift, cloud.y, 0, cloud.x + drift, cloud.y, cloud.radius);
        gradient.addColorStop(0, rgba(cloud.color, cloud.alpha * 2.8));
        gradient.addColorStop(0.45, rgba(cloud.color, cloud.alpha));
        gradient.addColorStop(1, rgba(cloud.color, 0));
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(cloud.x + drift, cloud.y, cloud.radius, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.translate(state.width * 0.5, state.height * 0.5);
      ctx.rotate(-0.34);
      const river = ctx.createLinearGradient(-state.width, 0, state.width, 0);
      river.addColorStop(0, "rgba(145, 190, 219, 0)");
      river.addColorStop(0.22, "rgba(93, 145, 179, 0.08)");
      river.addColorStop(0.48, "rgba(188, 216, 235, 0.18)");
      river.addColorStop(0.78, "rgba(69, 111, 149, 0.08)");
      river.addColorStop(1, "rgba(145, 190, 219, 0)");
      ctx.fillStyle = river;
      ctx.filter = "blur(18px)";
      ctx.fillRect(-state.width, -70, state.width * 2, 150);
      ctx.filter = "none";
      ctx.restore();

      state.stars.forEach((star) => {
        const pulse = 0.76 + Math.sin(now * 0.0012 + star.twinkle) * 0.24;
        ctx.globalAlpha = star.alpha * pulse;
        ctx.fillStyle = star.color;
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fill();
        if (star.size > 1.7) {
          ctx.globalAlpha = star.alpha * 0.35 * pulse;
          ctx.strokeStyle = star.color;
          ctx.lineWidth = 0.7;
          ctx.beginPath();
          ctx.moveTo(star.x - star.size * 3, star.y);
          ctx.lineTo(star.x + star.size * 3, star.y);
          ctx.moveTo(star.x, star.y - star.size * 3);
          ctx.lineTo(star.x, star.y + star.size * 3);
          ctx.stroke();
        }
      });
      ctx.globalAlpha = 1;
    }

    function drawEdges() {
      ctx.save();
      ctx.globalCompositeOperation = "screen";
      graphData.edges.forEach((edge, index) => {
        const source = nodeMap.get(edge.source);
        const target = nodeMap.get(edge.target);
        const sourcePos = worldToScreen(source.x, source.y);
        const targetPos = worldToScreen(target.x, target.y);
        const selected = edge.source === state.selectedId || edge.target === state.selectedId;
        const visible = isEdgeVisible(edge);
        const dx = targetPos.x - sourcePos.x;
        const dy = targetPos.y - sourcePos.y;
        const distance = Math.hypot(dx, dy) || 1;
        const bend = ((index % 5) - 2) * 0.035;
        const cx = (sourcePos.x + targetPos.x) / 2 - dy * bend;
        const cy = (sourcePos.y + targetPos.y) / 2 + dx * bend;
        const color = selected ? "#ffe1a3" : getColor(source);
        const alpha = visible ? (selected ? 0.74 : 0.24) : 0.045;
        const gradient = ctx.createLinearGradient(sourcePos.x, sourcePos.y, targetPos.x, targetPos.y);
        gradient.addColorStop(0, rgba(getColor(source), alpha));
        gradient.addColorStop(0.5, rgba(color, Math.min(0.86, alpha + 0.1)));
        gradient.addColorStop(1, rgba(getColor(target), alpha));
        ctx.strokeStyle = gradient;
        ctx.lineWidth = selected ? 1.55 : 0.85;
        ctx.shadowColor = color;
        ctx.shadowBlur = selected ? 18 : 8;
        ctx.beginPath();
        ctx.moveTo(sourcePos.x, sourcePos.y);
        ctx.quadraticCurveTo(cx, cy, targetPos.x, targetPos.y);
        ctx.stroke();

        if (selected && visible && state.view.scale > 0.44 && distance > 68) {
          drawEdgeLabel(edge.relation, cx, cy, color);
        }
      });
      ctx.restore();
    }

    function drawEdgeLabel(text, x, y, color) {
      ctx.save();
      ctx.font = "12px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
      const width = ctx.measureText(text).width + 16;
      const height = 22;
      ctx.fillStyle = "rgba(3, 10, 22, 0.68)";
      ctx.strokeStyle = rgba(color, 0.32);
      ctx.lineWidth = 1;
      roundRect(ctx, x - width / 2, y - height / 2, width, height, 6);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "#fff7dd";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, x, y + 0.5);
      ctx.restore();
    }

    function drawNodes(now) {
      const ordered = [...graphData.nodes].sort((a, b) => nodeRadius(a) - nodeRadius(b));
      ordered.forEach((node) => {
        const pos = worldToScreen(node.x, node.y);
        const visible = isNodeVisible(node);
        const selected = node.id === state.selectedId;
        const hovered = node.id === state.hoveredId;
        const radius = nodeRadius(node) * state.view.scale;
        const color = getColor(node);
        const pulse = 0.92 + Math.sin(now * 0.002 + hashNumber(node.id)) * 0.08;
        const alpha = visible ? 1 : 0.12;
        const halo = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, Math.max(20, radius * 4.2));
        halo.addColorStop(0, rgba(color, selected ? 0.62 * alpha : 0.36 * alpha));
        halo.addColorStop(0.42, rgba(color, selected ? 0.22 * alpha : 0.11 * alpha));
        halo.addColorStop(1, rgba(color, 0));
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        ctx.fillStyle = halo;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, Math.max(22, radius * 4.2), 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowColor = color;
        ctx.shadowBlur = selected ? 30 : hovered ? 22 : 14;
        ctx.fillStyle = rgba(color, visible ? 0.9 : 0.22);
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, Math.max(4.5, radius * pulse), 0, Math.PI * 2);
        ctx.fill();

        ctx.shadowBlur = selected ? 22 : 10;
        ctx.fillStyle = visible ? "#fffdf6" : "rgba(255,255,255,0.24)";
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, Math.max(2.2, radius * 0.38), 0, Math.PI * 2);
        ctx.fill();

        const flare = Math.max(10, radius * (selected ? 2.5 : 1.65));
        ctx.strokeStyle = rgba(visible ? "#fff8e5" : color, selected ? 0.82 : hovered ? 0.62 : 0.36);
        ctx.lineWidth = selected ? 1.25 : 0.85;
        ctx.beginPath();
        ctx.moveTo(pos.x - flare, pos.y);
        ctx.lineTo(pos.x + flare, pos.y);
        ctx.moveTo(pos.x, pos.y - flare);
        ctx.lineTo(pos.x, pos.y + flare);
        if (selected || node.importance >= 8) {
          ctx.moveTo(pos.x - flare * 0.62, pos.y - flare * 0.62);
          ctx.lineTo(pos.x + flare * 0.62, pos.y + flare * 0.62);
          ctx.moveTo(pos.x + flare * 0.62, pos.y - flare * 0.62);
          ctx.lineTo(pos.x - flare * 0.62, pos.y + flare * 0.62);
        }
        ctx.stroke();
        ctx.restore();

        if (visible && (selected || hovered || radius > 10 || state.view.scale > 0.8)) {
          drawNodeLabel(node, pos, radius, selected || hovered);
        }
      });
    }

    function drawNodeLabel(node, pos, radius, active) {
      const label = node.name;
      ctx.save();
      ctx.font = `${active ? 700 : 600} ${active ? 14 : 12}px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif`;
      const width = Math.min(140, ctx.measureText(label).width + 16);
      const height = active ? 26 : 22;
      const x = pos.x - width / 2;
      const y = pos.y + radius + 11;
      ctx.fillStyle = active ? "rgba(3, 10, 22, 0.72)" : "rgba(3, 10, 22, 0.45)";
      ctx.strokeStyle = active ? rgba(getColor(node), 0.4) : "rgba(180, 212, 255, 0.12)";
      roundRect(ctx, x, y, width, height, 6);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = active ? "#fff7dd" : "#d8e8f8";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(label, pos.x, y + height / 2 + 0.5, width - 10);
      ctx.restore();
    }

    function roundRect(context, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      context.beginPath();
      context.moveTo(x + r, y);
      context.arcTo(x + width, y, x + width, y + height, r);
      context.arcTo(x + width, y + height, x, y + height, r);
      context.arcTo(x, y + height, x, y, r);
      context.arcTo(x, y, x + width, y, r);
      context.closePath();
    }

    function draw(now) {
      const delta = Math.min(40, now - state.lastFrame);
      state.lastFrame = now;
      if (state.autoRotate && !state.pointer.isDown) {
        state.view.rotation += delta * 0.000035;
      }
      updateLayoutPositions();
      drawBackground(now);
      drawEdges();
      drawNodes(now);
      requestAnimationFrame(draw);
    }

    function hitTest(screenX, screenY) {
      let nearest = null;
      let nearestDistance = Infinity;
      graphData.nodes.forEach((node) => {
        if (!isNodeVisible(node)) return;
        const pos = worldToScreen(node.x, node.y);
        const radius = Math.max(12, nodeRadius(node) * state.view.scale + 8);
        const distance = Math.hypot(pos.x - screenX, pos.y - screenY);
        if (distance < radius && distance < nearestDistance) {
          nearest = node;
          nearestDistance = distance;
        }
      });
      return nearest;
    }

    function focusNode(id, options = {}) {
      const node = nodeMap.get(id);
      if (!node) return;
      state.selectedId = id;
      const cos = Math.cos(state.view.rotation);
      const sin = Math.sin(state.view.rotation);
      const rx = node.x * cos - node.y * sin;
      const ry = node.x * sin + node.y * cos;
      state.view.x += (-rx - state.view.x) * (options.instant ? 1 : 0.92);
      state.view.y += (-ry - state.view.y) * (options.instant ? 1 : 0.92);
      if (options.zoom !== false) {
        const targetScale = window.innerWidth < 760 ? 0.92 : 1.02;
        state.view.scale += (targetScale - state.view.scale) * 0.7;
      }
      updateDetails(node);
      document.body.classList.add("panel-open");
      if (options.toast) showToast(`已定位：${node.name}`);
    }

    function updateDetails(node) {
      detailName.textContent = node.name;
      detailAlias.textContent = Array.isArray(node.alias) && node.alias.length ? `别名 / 称号：${node.alias.join(" · ")}` : "别名 / 称号：暂无";
      detailBio.textContent = node.bio || "";
      detailTags.innerHTML = "";
      [
        node.category,
        node.rank,
        node.level,
        node.role,
        node.faction,
        node.era
      ].filter(Boolean).forEach((tagText) => {
        const tag = document.createElement("span");
        tag.className = "tag";
        tag.textContent = tagText;
        detailTags.appendChild(tag);
      });

      const relations = graphData.edges
        .filter((edge) => edge.source === node.id || edge.target === node.id)
        .sort((a, b) => {
          const otherA = a.source === node.id ? a.target : a.source;
          const otherB = b.source === node.id ? b.target : b.source;
          return (degree.get(otherB) || 0) - (degree.get(otherA) || 0);
        });
      detailRelations.innerHTML = "";
      if (!relations.length) {
        const empty = document.createElement("p");
        empty.className = "empty-state";
        empty.textContent = "暂无关系线。";
        detailRelations.appendChild(empty);
        return;
      }
      relations.forEach((edge) => {
        const otherId = edge.source === node.id ? edge.target : edge.source;
        const other = nodeMap.get(otherId);
        const button = document.createElement("button");
        button.type = "button";
        button.className = "relation-button";
        button.innerHTML = `<strong>${edge.relation} · ${other.name}</strong><span>${edge.event || edge.description || ""}</span>`;
        button.addEventListener("click", () => focusNode(other.id, { toast: true }));
        detailRelations.appendChild(button);
      });
    }

    function renderFilter(container, type, values) {
      container.innerHTML = "";
      const all = document.createElement("button");
      all.type = "button";
      all.className = "chip is-active";
      all.dataset.filterType = type;
      all.dataset.value = "all";
      all.textContent = "全部";
      container.appendChild(all);
      values.forEach((value) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "chip";
        button.dataset.filterType = type;
        button.dataset.value = value;
        const color = type === "category" ? (categoryColors[value] || "#dcecff") : "#b9d4ff";
        button.innerHTML = `<i style="color:${color}; background:${color}"></i>${value}`;
        container.appendChild(button);
      });
    }

    function updateFilterButtons() {
      document.querySelectorAll(".chip[data-filter-type]").forEach((button) => {
        const type = button.dataset.filterType;
        button.classList.toggle("is-active", state.filters[type] === button.dataset.value);
      });
      const visibleNodes = graphData.nodes.filter(isNodeVisible);
      visibleCount.textContent = `${visibleNodes.length} / ${graphData.nodes.length} 个节点`;
    }

    function syncSelectionWithFilters() {
      const selected = nodeMap.get(state.selectedId);
      if (selected && isNodeVisible(selected)) return;
      const nextNode = graphData.nodes
        .filter(isNodeVisible)
        .sort((a, b) => b.importance - a.importance || (degree.get(b.id) || 0) - (degree.get(a.id) || 0))[0];
      if (nextNode) focusNode(nextNode.id, { zoom: false });
    }

    function clearFilters() {
      state.filters = { category: "all", role: "all", level: "all" };
      updateFilterButtons();
    }

    function searchableText(node) {
      return [
        node.name,
        ...(Array.isArray(node.alias) ? node.alias : [node.alias]),
        node.category,
        node.rank,
        node.level,
        node.role,
        node.faction,
        node.era,
        node.bio
      ].filter(Boolean).join(" ").toLowerCase();
    }

    function searchScore(node, query) {
      const name = node.name.toLowerCase();
      const aliases = (Array.isArray(node.alias) ? node.alias : [node.alias]).filter(Boolean).map((value) => value.toLowerCase());
      if (name === query) return 1000;
      if (aliases.some((alias) => alias === query)) return 940;
      if (name.includes(query)) return 900;
      if (aliases.some((alias) => alias.includes(query))) return 840;
      if ([node.category, node.role, node.level, node.rank, node.faction, node.era].filter(Boolean).join(" ").toLowerCase().includes(query)) return 620;
      if (searchableText(node).includes(query)) return 320;
      return 0;
    }

    function renderSearchResults() {
      const query = searchInput.value.trim().toLowerCase();
      searchResults.innerHTML = "";
      if (!query) {
        searchResults.classList.remove("is-open");
        return;
      }
      const matches = graphData.nodes
        .map((node) => ({ node, score: searchScore(node, query) }))
        .filter((item) => item.score > 0)
        .sort((a, b) => b.score - a.score || b.node.importance - a.node.importance || (degree.get(b.node.id) || 0) - (degree.get(a.node.id) || 0))
        .map((item) => item.node)
        .slice(0, 9);
      if (!matches.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.style.padding = "10px";
        empty.textContent = "没有匹配的节点";
        searchResults.appendChild(empty);
        searchResults.classList.add("is-open");
        return;
      }
      matches.forEach((node) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "result-button";
        button.innerHTML = `
          <span class="result-dot" style="color:${getColor(node)}; background:${getColor(node)}"></span>
          <span class="result-name">${node.name}</span>
          <span class="result-meta">${node.category}</span>
        `;
        button.addEventListener("click", () => {
          clearFilters();
          focusNode(node.id, { toast: true });
          searchInput.value = "";
          searchResults.classList.remove("is-open");
        });
        searchResults.appendChild(button);
      });
      searchResults.classList.add("is-open");
    }

    function renderImportantList() {
      const important = [...graphData.nodes]
        .sort((a, b) => {
          const scoreA = (degree.get(a.id) || 0) * 2 + a.importance;
          const scoreB = (degree.get(b.id) || 0) * 2 + b.importance;
          return scoreB - scoreA;
        })
        .slice(0, 10);
      importantList.innerHTML = "";
      important.forEach((node) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "important-button";
        button.innerHTML = `
          <span class="important-orb" style="color:${getColor(node)}; background:${getColor(node)}"></span>
          <span class="important-text">
            <span class="important-name">${node.name}</span>
            <span class="important-meta">${degree.get(node.id) || 0} 条关系 · ${node.level}</span>
          </span>
        `;
        button.addEventListener("click", () => {
          clearFilters();
          focusNode(node.id, { toast: true });
        });
        importantList.appendChild(button);
      });
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("is-visible");
      clearTimeout(state.toastTimer);
      state.toastTimer = setTimeout(() => toastEl.classList.remove("is-visible"), 1400);
    }

    function resetView() {
      state.view.scale = window.innerWidth < 760 ? 0.72 : 0.92;
      state.view.rotation = -0.08;
      focusNode("group188", { instant: true, zoom: false });
      showToast("视图已重置");
    }

    function bindEvents() {
      window.addEventListener("resize", resizeCanvas);

      canvas.addEventListener("pointerdown", (event) => {
        canvas.setPointerCapture(event.pointerId);
        state.pointer.isDown = true;
        state.pointer.moved = false;
        state.pointer.x = event.clientX;
        state.pointer.y = event.clientY;
        state.pointer.lastX = event.clientX;
        state.pointer.lastY = event.clientY;
        canvas.classList.add("dragging");
      });

      canvas.addEventListener("pointermove", (event) => {
        const hit = hitTest(event.clientX, event.clientY);
        state.hoveredId = hit ? hit.id : null;
        if (!state.pointer.isDown) return;
        const dx = event.clientX - state.pointer.lastX;
        const dy = event.clientY - state.pointer.lastY;
        if (Math.hypot(event.clientX - state.pointer.x, event.clientY - state.pointer.y) > 4) {
          state.pointer.moved = true;
        }
        state.view.x += dx / state.view.scale;
        state.view.y += dy / state.view.scale;
        state.pointer.lastX = event.clientX;
        state.pointer.lastY = event.clientY;
      });

      canvas.addEventListener("pointerup", (event) => {
        canvas.releasePointerCapture(event.pointerId);
        canvas.classList.remove("dragging");
        const wasDrag = state.pointer.moved;
        state.pointer.isDown = false;
        if (!wasDrag) {
          const hit = hitTest(event.clientX, event.clientY);
          if (hit) focusNode(hit.id);
        }
      });

      canvas.addEventListener("pointercancel", () => {
        state.pointer.isDown = false;
        canvas.classList.remove("dragging");
      });

      canvas.addEventListener("wheel", (event) => {
        event.preventDefault();
        const before = screenToWorld(event.clientX, event.clientY);
        const nextScale = Math.max(0.34, Math.min(2.6, state.view.scale * Math.exp(-event.deltaY * 0.001)));
        state.view.scale = nextScale;
        const cos = Math.cos(state.view.rotation);
        const sin = Math.sin(state.view.rotation);
        const rx = before.x * cos - before.y * sin;
        const ry = before.x * sin + before.y * cos;
        state.view.x = (event.clientX - state.width / 2) / state.view.scale - rx;
        state.view.y = (event.clientY - state.height / 2) / state.view.scale - ry;
      }, { passive: false });

      document.addEventListener("click", (event) => {
        if (!event.target.closest(".search-wrap")) {
          searchResults.classList.remove("is-open");
        }
      });

      searchInput.addEventListener("input", renderSearchResults);
      searchInput.addEventListener("focus", renderSearchResults);

      document.querySelector(".filter-row").addEventListener("click", (event) => {
        const button = event.target.closest(".chip[data-filter-type]");
        if (!button) return;
        state.filters[button.dataset.filterType] = button.dataset.value;
        updateFilterButtons();
        syncSelectionWithFilters();
        showToast(button.dataset.value === "all" ? "已显示该组全部节点" : `已筛选：${button.dataset.value}`);
      });

      showAllBtn.addEventListener("click", () => {
        clearFilters();
        showToast("已显示全部节点");
      });

      rotateBtn.addEventListener("click", () => {
        state.autoRotate = !state.autoRotate;
        rotateBtn.classList.toggle("is-active", state.autoRotate);
        rotateBtn.lastChild.textContent = state.autoRotate ? " 停止旋转" : " 开始旋转";
      });

      layoutBtn.addEventListener("click", () => {
        state.layout = state.layout === "nebula" ? "layered" : "nebula";
        layoutBtn.lastChild.textContent = state.layout === "nebula" ? " 分层布局" : " 星云布局";
        showToast(state.layout === "nebula" ? "已切换到星云布局" : "已切换到分层布局");
      });

      resetBtn.addEventListener("click", resetView);

      closePanelBtn.addEventListener("click", () => {
        document.body.classList.remove("panel-open");
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          searchResults.classList.remove("is-open");
          document.body.classList.remove("panel-open");
        }
      });
    }

    function init() {
      setupLayouts();
      resizeCanvas();
      renderFilter(categoryFilters, "category", categories);
      renderFilter(roleFilters, "role", roles);
      renderFilter(levelFilters, "level", levels);
      renderImportantList();
      updateFilterButtons();
      updateDetails(nodeMap.get(state.selectedId));
      document.body.classList.add("panel-open");
      rotateBtn.classList.toggle("is-active", state.autoRotate);
      rotateBtn.lastChild.textContent = state.autoRotate ? " 停止旋转" : " 开始旋转";
      resetView();
      bindEvents();
      requestAnimationFrame(draw);
    }

    init();
  </script>
</body>
</html>
